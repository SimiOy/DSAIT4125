name: surgical-action-recognition
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.10
  - pip
  - numpy
  - pandas
  - scipy
  - scikit-learn
  - matplotlib
  - tqdm
  - pillow
  - pyyaml
  - ffmpeg
  - pip:
      # Surgformer dependencies
      - einops==0.6.1
      - decord==0.6.0           # fast video loading (Surgformer datasets)
      # PyTorch 1.x use deepspeed==0.9.5; PyTorch 2.x use deepspeed==0.14.0
      - deepspeed==0.9.5
      - tensorboard
      - tensorboardx
      # EndoViT weight download
      - huggingface-hub
      - safetensors
      # Dataset download scripts
      - synapseclient
      - requests
      - wandb
      - scikit-image
      - imageio
      - opencv-python-headless==4.8.1.78
      - imgaug
